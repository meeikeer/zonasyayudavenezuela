<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zona y Ayuda - Venezuela</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="flex flex-col h-full bg-gray-100">

  <!-- TOSTADA -->
  <div id="toast" class="toast"></div>

  <!-- CABECERA -->
  <header class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 bg-white border-b border-gray-300">
    <div class="flex items-center gap-3">
      <span class="text-2xl">📍</span>
      <h1 class="text-lg font-bold text-gray-800 leading-tight">Mapa Solidario</h1>
    </div>
    <div class="flex items-center gap-3 flex-wrap">
      <!-- BUSCADOR -->
      <div class="flex items-center gap-1">
        <input type="text" id="input-buscar"
               placeholder="Buscar dirección..."
               class="w-40 lg:w-56 px-3 py-1.5 border border-gray-400 rounded text-sm outline-none">
        <button id="btn-buscar"
                class="px-3 py-1.5 text-sm bg-black text-white rounded">
          Buscar
        </button>
      </div>
      <label for="estado-select" class="text-sm font-medium text-gray-600">Estado:</label>
      <select id="estado-select"
              class="px-3 py-1.5 border border-gray-400 rounded text-sm bg-white outline-none">
      </select>
      <button id="btn-mi-ubicacion"
              class="px-3 py-1.5 text-sm rounded border border-gray-400 flex items-center gap-1.5">
        <span>📍</span> Mi ubicación
      </button>
    </div>
  </header>

  <!-- MAPA + LISTA -->
  <main class="flex-1 relative flex">
    <div id="map" class="flex-1"></div>

    <!-- LISTA LATERAL DE CENTROS -->
    <div id="lista-centros" class="lista-centros">
      <div class="lista-header">
        <span id="lista-titulo" class="font-bold text-gray-800">Centros</span>
      </div>
      <div id="lista-body" class="lista-body">
        <div class="text-gray-400 text-sm text-center py-8">Selecciona un estado</div>
      </div>
    </div>
  </main>

  <div id="loading-indicator"
       class="absolute top-4 left-1/2 -translate-x-1/2 bg-white px-4 py-2 rounded-full text-sm text-gray-600" style="z-index: 1000; opacity:0;">
    <span class="loading-dots">Cargando centros</span>
  </div>

  <!-- MODAL: CREAR / EDITAR -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 id="modal-title" class="text-xl font-bold text-gray-800">Nuevo Centro</h2>
        <button id="modal-close" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>

      <form id="centro-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Estado</label>
          <input type="text" id="form-estado" readonly
                 class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded text-sm text-gray-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Nombre del centro</label>
          <input type="text" id="form-nombre" required
                 placeholder="Ej: Escuela Básica Los Samanes"
                 class="w-full px-3 py-2 border border-gray-400 rounded text-sm outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Dirección</label>
          <input type="text" id="form-direccion"
                 placeholder="Ej: Av. Principal, sector Los Samanes"
                 class="w-full px-3 py-2 border border-gray-400 rounded text-sm outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Categoría</label>
          <select id="form-categoria"
                  class="w-full px-3 py-2 border border-gray-400 rounded text-sm outline-none">
            <option value="Acopio">📦 Centro de Acopio</option>
            <option value="Refugio">🏠 Refugio</option>
            <option value="Zona de Desastre">⚠️ Zona de Desastre</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Latitud</label>
            <input type="text" id="form-lat" readonly
                   class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded text-sm text-gray-500 font-mono">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Longitud</label>
            <input type="text" id="form-lng" readonly
                   class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded text-sm text-gray-500 font-mono">
          </div>
        </div>
        <p class="text-xs text-gray-400 -mt-2">* Haz clic en el mapa para capturar coordenadas</p>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Insumos</label>
          <div id="insumos-container" class="flex flex-wrap gap-2 mb-2 min-h-[2rem]"></div>
          <div class="flex gap-2">
            <input type="text" id="form-nuevo-insumo"
                   placeholder="Ej: Agua, medicinas, ropa..."
                   class="flex-1 px-3 py-1.5 border border-gray-400 rounded text-sm outline-none"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();window.agregarInsumo()}">
            <button type="button" onclick="window.agregarInsumo()"
                    class="px-3 py-1.5 border border-gray-400 rounded text-sm font-medium">
              + Agregar
            </button>
          </div>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" id="btn-eliminar"
                  class="hidden px-4 py-2 bg-black text-white rounded text-sm font-medium">
            Eliminar
          </button>
          <div class="flex-1"></div>
          <button type="button" onclick="window.cerrarModal()"
                  class="px-4 py-2 border border-gray-400 rounded text-sm font-medium">
            Cancelar
          </button>
          <button type="submit"
                  id="btn-submit"
                  class="px-5 py-2 bg-black text-white rounded text-sm font-medium">
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: INFORMACIÓN DETALLADA -->
  <div id="modal-detalle-overlay" class="modal-overlay">
    <div class="modal-content p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 id="detalle-titulo" class="text-xl font-bold text-gray-800">Centro</h2>
        <button id="detalle-cerrar" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>
      <div id="detalle-contenido" class="space-y-4">
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Entry point de la aplicación modular -->
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
